<div class="search-section container mb-4">

  <div class="search-wrapper">

    <mat-form-field
      appearance="outline"
      class="w-100">

      <mat-label>
        Search Pokémon
      </mat-label>

      <input
        matInput
        type="text"
        placeholder="Search by name..."
        [(ngModel)]="searchValue"
        (input)="onSearch()"
      />

    </mat-form-field>

  </div>

</div>
